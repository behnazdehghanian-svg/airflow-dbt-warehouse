version: 2

models:
  - name: staging_orders
    columns:
      - name: order_id
        tests:
          - unique
          - not_null
      - name: customer_id
        tests:
          - not_null
      - name: total_amount
        tests:
          - not_null
      - name: order_date
        tests:
          - not_null

  - name: staging_customers
    columns:
      - name: customer_id
        tests:
          - unique
          - not_null
      - name: email
        tests:
          - unique
          - not_null

  - name: staging_products
    columns:
      - name: product_id
        tests:
          - unique
          - not_null
